services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    platform: linux/arm64
    environment:
      SA_PASSWORD: "DevOps_Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Master=Server=db;User Id=sa;Password=DevOps_Pass123;TrustServerCertificate=True;
      - ConnectionStrings__App=Server=db;Database=ManagementSystemDB;User Id=sa;Password=DevOps_Pass123;TrustServerCertificate=True;
    depends_on:
      - db
    restart: on-failure

volumes:
  mssql_data: